spring.application.name=minimarket
# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT (use env var in production)
jwt.secret=MiniMarketPlusSemana2ClaveSecretaJWT256BitsMinimaSegura2026
jwt.expiration=900000
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# Login attempt (anti brute force)
security.login.max-attempts=5
security.login.lock-minutes=15

# Rate limit auth endpoints
security.rate-limit.auth-per-minute=30

# MFA TOTP
security.mfa.issuer=MiniMarketPlus
security.mfa.token-expiration-ms=300000

# Data retention / anonymization
data.retention.enabled=true
data.retention.inactive-days=90
data.retention.cron=0 0 2 * * *

# Monitoreo actividad sospechosa (Semana 3)
security.monitor.failed-login-threshold=5
security.monitor.request-threshold=200
security.monitor.window-minutes=15

# Springdoc OpenAPI (Semana 7)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# HATEOAS HAL + paginacion (Semana 8)
spring.hateoas.use-hal-as-default-json-media-type=true
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50
spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size
